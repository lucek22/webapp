<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Self-Measuring Pose App</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.roboflow.com/0.2.26/roboflow.js"></script>
</head>
<body>
  <h1>Self-Measuring Pose App</h1>
  
  <div class="controls">
    <button id="webcamButton" disabled>Loading Model...</button>
    <button id="captureButton" disabled>Start 3s Timer & Measure</button>
  </div>

    <div class="app-container">
        
        <div class="video-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div id="countdownOverlay" class="hidden"></div>
        </div>

        <div id="resultsCard" class="hidden">
        <h3>Your Measurements</h3>
        <p>Height: <span id="heightResult">--</span></p>
        <p>Wingspan: <span id="wingspanResult">--</span></p>
        <small id="scaleNote">Using default scaling</small>
        </div>

  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
